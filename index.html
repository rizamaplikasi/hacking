<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikSave Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #050505; font-family: 'Plus Jakarta Sans', sans-serif; color: #ffffff; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem; }
        #progressBar { width: 0%; height: 100%; background: linear-gradient(90deg, #69C9D0, #EE1D52); transition: width 0.3s ease; }
        .btn-premium { background: #ffffff; color: #000; transition: all 0.3s ease; border-radius: 1.25rem; }
        .glow { position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(238, 29, 82, 0.1) 0%, transparent 70%); z-index: -1; filter: blur(60px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <div class="glow top-[-100px] left-[-100px]"></div>
    <div class="glow bottom-[-100px] right-[-100px]" style="background: radial-gradient(circle, rgba(105, 201, 208, 0.1) 0%, transparent 70%);"></div>

    <div class="max-w-md w-full animate__animated animate__fadeIn">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-extrabold tracking-tight">TikSave Pro</h1>
            <p class="text-gray-500 text-sm">Simpan video semudah simpan foto</p>
        </div>

        <div class="glass-panel p-8 shadow-2xl">
            <div class="space-y-4">
                <input type="text" id="videoUrl" placeholder="Tempel link TikTok di sini..." 
                       class="w-full bg-white/5 border border-white/5 rounded-2xl py-4 px-6 outline-none focus:border-white/20 text-sm">
                <button id="fetchBtn" onclick="processAnalysis()" class="btn-premium w-full py-4 font-bold text-sm uppercase tracking-wider">
                    Proses Video
                </button>
            </div>

            <div id="resultArea" class="hidden mt-8 pt-8 border-t border-white/5 animate__animated animate__fadeIn">
                <div class="flex items-center gap-4 mb-6">
                    <img id="thumb" src="" class="w-16 h-16 rounded-xl object-cover border border-white/10">
                    <div class="flex-1 min-w-0">
                        <p id="videoTitle" class="text-sm font-bold truncate">Judul Video</p>
                        <p id="videoAuthor" class="text-xs text-gray-500">@username</p>
                    </div>
                </div>

                <div id="loadingSection" class="space-y-2 mb-6">
                    <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest">
                        <span id="statusLabel" class="text-cyan-400">Menyiapkan...</span>
                        <span id="percentLabel">0%</span>
                    </div>
                    <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
                        <div id="progressBar"></div>
                    </div>
                </div>

                <button id="dlBtn" class="hidden w-full bg-white/10 hover:bg-white/20 py-4 rounded-2xl font-bold text-xs uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-download"></i> Simpan Video
                </button>
            </div>
        </div>
    </div>

    <script>
        let videoFinalUrl = "";

        async function processAnalysis() {
            const url = document.getElementById('videoUrl').value.trim();
            const fetchBtn = document.getElementById('fetchBtn');
            const resultArea = document.getElementById('resultArea');
            
            if (!url.includes("tiktok.com")) { alert("Link tidak valid!"); return; }

            fetchBtn.disabled = true;
            fetchBtn.innerText = "Menganalisis...";
            resultArea.classList.add('hidden');

            try {
                const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const json = await res.json();

                if (json.code === 0) {
                    videoFinalUrl = json.data.play;
                    document.getElementById('thumb').src = json.data.cover;
                    document.getElementById('videoTitle').innerText = json.data.title || "TikTok Video";
                    document.getElementById('videoAuthor').innerText = `@${json.data.author.unique_id}`;
                    resultArea.classList.remove('hidden');
                    simulateLoading();
                }
            } catch (e) { alert("Gagal mengambil data."); fetchBtn.disabled = false; }
        }

        function simulateLoading() {
            const bar = document.getElementById('progressBar');
            const percentLabel = document.getElementById('percentLabel');
            const dlBtn = document.getElementById('dlBtn');
            let progress = 0;

            dlBtn.classList.add('hidden');
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 10) + 2;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    document.getElementById('statusLabel').innerText = "Siap!";
                    dlBtn.classList.remove('hidden');
                }
                bar.style.width = progress + "%";
                percentLabel.innerText = progress + "%";
            }, 100);
        }

        // FUNGSI SIMPAN (Sama seperti browser menyimpan file)
        document.getElementById('dlBtn').onclick = () => {
            const a = document.createElement('a');
            a.href = videoFinalUrl;
            // Ini akan memicu browser untuk menyimpan file ke folder Download default
            // Persis seperti "Save As" pada gambar.
            a.download = `TikTok_Video_${Date.now()}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            // Memberikan feedback kecil
            document.getElementById('statusLabel').innerText = "Berhasil Disimpan!";
        };
    </script>
</body>
</html>
